---
apiVersion: v1
kind: Namespace
metadata:
  name: feature-serving
  labels:
    app.kubernetes.io/part-of: mlops-feature-platform

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: feature-api
  namespace: feature-serving
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/feature-api-irsa-role

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-api
  namespace: feature-serving
  labels:
    app: feature-api
    version: "1.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: mlops-feature-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: feature-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: feature-api
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: feature-api
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: feature-api
      containers:
        - name: feature-api
          image: ghcr.io/shaikn6/mlops-feature-platform/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: ENV
              value: production
            - name: FEAST_REPO_PATH
              value: /opt/feature_store
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: host
            - name: REDIS_PORT
              value: "6379"
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow.mlflow.svc.cluster.local:5000
            - name: LOG_LEVEL
              value: INFO
            - name: WORKERS
              value: "4"
            - name: TIMEOUT_SECONDS
              value: "10"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 12
            periodSeconds: 5
          volumeMounts:
            - name: feature-store-config
              mountPath: /opt/feature_store
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: feature-store-config
          configMap:
            name: feast-repo-config
      securityContext:
        fsGroup: 1000

---
apiVersion: v1
kind: Service
metadata:
  name: feature-api
  namespace: feature-serving
  labels:
    app: feature-api
spec:
  type: ClusterIP
  selector:
    app: feature-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: feature-api
  namespace: feature-serving
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: feature-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: feature-api
  namespace: feature-serving
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - features.mlops.example.com
      secretName: feature-api-tls
  rules:
    - host: features.mlops.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: feature-api
                port:
                  name: http

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: feature-api
  namespace: feature-serving
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: feature-api
