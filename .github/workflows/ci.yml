name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: {python-version: "3.11"}
      - run: pip install ruff && ruff check . --ignore E501 --ignore UP042 || true
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: {python-version: "3.11"}
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pydantic fastapi uvicorn httpx numpy scipy pandas great-expectations feast
      - name: Run tests with 95% coverage threshold
        run: |
          pytest tests/ -v \
            --cov=feature_store \
            --cov=monitoring \
            --cov=model_registry \
            --cov=pipelines \
            --cov=api \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=95 \
            --ignore=tests/__init__.py
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: {python-version: "3.11"}
      - run: pip install bandit && bandit -r . -ll --exclude ./.git,./tests || true
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t mlops-feature-platform:ci . || echo "No Dockerfile"
        continue-on-error: true
